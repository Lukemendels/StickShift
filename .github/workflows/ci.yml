name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -q

      - name: ASCII guard (builds/*.bas must contain no non-ASCII bytes)
        run: |
          if grep -rIP "[^\x00-\x7F]" builds/*.bas; then
            echo "Non-ASCII characters found in builds/*.bas" >&2
            exit 1
          fi
          echo "ASCII guard passed."

      - name: ChrW guard (builds/*.bas must not use ChrW)
        run: |
          if grep -rIn "ChrW" builds/*.bas; then
            echo "ChrW found in builds/*.bas - use plain ASCII literals" >&2
            exit 1
          fi
          echo "ChrW guard passed."
